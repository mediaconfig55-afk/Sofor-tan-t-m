<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayık Şoför | Test Katılım</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#D4AF37;
  --black:#000;
  --card:#121212;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--black);
  color:var(--gold);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
}

/* Glow Background */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(212,175,55,0.15), transparent 70%);
  animation:glow 6s infinite alternate;
  z-index:-1;
}

@keyframes glow{
  from{transform:scale(1);opacity:0.4;}
  to{transform:scale(1.2);opacity:0.7;}
}

.container{
  max-width:500px;
  padding:30px;
  background:var(--card);
  border-radius:20px;
  border:1px solid rgba(212,175,55,0.2);
  animation:fadeIn 1.2s ease;
}

h1{
  margin-bottom:20px;
  letter-spacing:3px;
}

p{
  font-size:14px;
  margin-bottom:30px;
  opacity:0.85;
}

button{
  padding:12px 28px;
  margin:10px;
  border-radius:30px;
  border:2px solid var(--gold);
  background:none;
  color:var(--gold);
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:var(--gold);
  color:black;
  box-shadow:0 0 20px rgba(212,175,55,0.6);
}

.hidden{
  display:none;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>AYIK ŞOFÖR</h1>
  <p>
    Uygulamayı indirebilmek için önce test grubuna katılmanız gerekmektedir.
  </p>

  <div id="step1">
    <button onclick="joinGroup()">Test Grubuna Katıl</button>
  </div>

  <div id="step2" class="hidden">
    <p>Google Group katılım işlemini tamamladıysanız devam edin.</p>
    <button onclick="goPlayStore()">Katıldım, Devam Et</button>
  </div>

</div>

<script>
function joinGroup(){
  window.open("https://groups.google.com/g/testerslocal", "_blank");
  document.getElementById("step1").classList.add("hidden");
  document.getElementById("step2").classList.remove("hidden");
}

function goPlayStore(){
  window.location.href = "https://play.google.com/store/apps/details?id=com.ayiksofor.app";
}
</script>

</body>
</html>
